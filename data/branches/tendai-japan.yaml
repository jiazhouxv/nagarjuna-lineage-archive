summary_zh: "日本天台宗是天台宗在日本的地域分支，通常以传教大师最澄赴唐求法、回国后以比叡山延历寺为中心建立日本天台宗基础为关键起点。日本天台宗承接中国天台宗的《法华经》中心地位、教观体系、止观传统和圆教思想，同时在日本发展过程中与密教、菩萨戒、禅观和日本本土佛教制度产生深度结合。比叡山后来成为日本佛教史上极具影响力的修学中心，对镰仓新佛教诸宗也有深远影响。本资料库将日本天台宗记录为 tiantai 总宗派下的日本地域分支，并重点追踪其与中国天台宗、最澄、比叡山和日本佛教史的关系。"

summary_en: "Japanese Tendai is the Japanese regional branch of the Tiantai tradition. It is commonly traced to Saicho's study in Tang China and his later establishment of the foundations of Tendai in Japan centered on Mount Hiei and Enryaku-ji. Japanese Tendai inherited the Lotus Sutra focus, doctrinal-contemplative system, calming and contemplation traditions, and perfect teaching framework of Chinese Tiantai, while developing distinctive Japanese forms in relation to esoteric Buddhism, bodhisattva precepts, meditation, and Japanese Buddhist institutions. Mount Hiei later became one of the most influential training centers in Japanese Buddhist history. This archive records Japanese Tendai as the Japanese regional branch under the parent Tiantai tradition, with a focus on its connections to Chinese Tiantai, Saicho, Mount Hiei, and Japanese Buddhist history."

