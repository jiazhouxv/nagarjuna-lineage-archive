name_usage_note_zh: "日本天台宗指由最澄赴唐求法后在日本建立和发展的天台宗分支。日本语境中通常称 Tendai 或 Tendai-shū。本资料库将其作为 tiantai 总宗派下的日本地域分支。"
name_usage_note_en: "Japanese Tendai refers to the branch of the Tiantai tradition established and developed in Japan after Saicho's study in Tang China. In Japanese contexts it is commonly called Tendai or Tendai-shu. This archive records it as the Japanese regional branch under the parent Tiantai tradition."

