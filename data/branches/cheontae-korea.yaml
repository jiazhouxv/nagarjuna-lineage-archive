name_usage_note_zh: "韩国天台宗指天台宗在朝鲜半岛，尤其是高丽时期经义天推动而形成和发展的地域分支。韩国语境中通常称 Cheontae。本资料库将其作为 tiantai 总宗派下的韩国地域分支。"
name_usage_note_en: "Korean Cheontae refers to the Korean regional branch of the Tiantai tradition, especially associated with Uicheon's efforts during the Goryeo period. In Korean contexts it is commonly called Cheontae. This archive records it as the Korean regional branch under the parent Tiantai tradition."

