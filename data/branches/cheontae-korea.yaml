summary_zh: "韩国天台宗是天台宗在朝鲜半岛的地域分支，通常与高丽时期大觉国师义天的活动密切相关。义天出身高丽王室，重视佛教典籍整理、教观学习和宗派调和，通常被视为推动高丽天台宗独立成宗的重要人物。韩国天台宗承接中国天台宗的《法华经》中心地位、教观体系和止观传统，同时在高丽佛教语境中与华严宗、禅宗以及教宗与禅宗调和的问题发生深度互动。本资料库将韩国天台宗记录为 tiantai 总宗派下的韩国地域分支，并重点追踪其与中国天台宗、义天、高丽佛教和教禅调和思想的关系。"

summary_en: "Korean Cheontae is the Korean regional branch of the Tiantai tradition and is closely associated with the activity of Daegak Guksa Uicheon during the Goryeo period. Uicheon, a Goryeo royal prince, emphasized Buddhist textual organization, doctrinal-contemplative learning, and the harmonization of Buddhist traditions. He is commonly regarded as a key figure in establishing Cheontae as an independent school in Goryeo. Korean Cheontae inherited the Lotus Sutra focus, doctrinal-contemplative system, and calming and contemplation traditions of Chinese Tiantai, while developing in interaction with Hwaeom, Seon, and broader issues of doctrinal and meditation integration in Goryeo Buddhism. This archive records Korean Cheontae as the Korean regional branch under the parent Tiantai tradition, with a focus on its relation to Chinese Tiantai, Uicheon, Goryeo Buddhism, and doctrinal-meditation harmonization."

