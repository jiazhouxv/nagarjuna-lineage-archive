summary_zh: "中国天台宗是天台宗的核心源流，以中国天台山传统和智者大师所系统化的教观体系为中心。其思想源流常上溯至龙树菩萨、中观思想、般若思想和鸠摩罗什译经传统；在中国佛教史中，经慧文、慧思、智者大师、章安大师灌顶、荆溪湛然等人物逐步形成、整理、传播和复兴。中国天台宗以《法华经》为重要经典基础，以止观、三谛、一念三千、五时八教、判教体系等为重要教义特色。日本天台宗 Tendai 和韩国天台宗 Cheontae 后来都与中国天台宗的传播和转化有关。本资料库将中国天台宗记录为 tiantai 总宗派下的第一个地域分支。"

summary_en: "Chinese Tiantai is the central source branch of the Tiantai tradition, centered on the Chinese Mount Tiantai tradition and the doctrinal-contemplative system systematized by Master Zhiyi. Its intellectual sources are often traced to Nagarjuna, Madhyamaka thought, Prajnaparamita traditions, and Kumarajiva's translation activity. In Chinese Buddhist history, the tradition developed through figures such as Huiwen, Huisi, Master Zhiyi, Master Guanding, and Jingxi Zhanran. Chinese Tiantai takes the Lotus Sutra as a major scriptural foundation and is characterized by doctrines and practices such as calming and contemplation, the three truths, one thought containing three thousand, the five periods and eight teachings, and doctrinal classification. Japanese Tendai and Korean Cheontae are later connected to the transmission and transformation of Chinese Tiantai. This archive records Chinese Tiantai as the first regional branch under the parent Tiantai tradition."

