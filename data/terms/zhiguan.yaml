term_usage_note_zh: "止观是天台宗教观体系和修行体系的核心术语之一。“止”偏重安止、寂静、定；“观”偏重观察、照见、慧。本资料库以 zhiguan 作为稳定 ID。"
term_usage_note_en: "Zhiguan is one of the central doctrinal and practice terms in Tiantai Buddhism. Zhi is associated with calming, stilling, or meditative stabilization, while guan is associated with contemplation, observation, or insight. This archive uses zhiguan as the stable ID."

