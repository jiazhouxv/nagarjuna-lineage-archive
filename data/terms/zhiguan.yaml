summary_zh: "止观是天台宗最核心的修行与教义术语之一。“止”指止息散乱、安住一境、令心寂静；“观”指观察诸法、照见实相、开发智慧。在天台宗中，止观不是单纯的禅定技巧，而是与三谛、一念三千、圆教思想和《摩诃止观》等核心典籍密切相连的完整教观体系。智者大师所系统化的天台止观，对中国、日本和韩国天台传统都产生了深远影响。"

summary_en: "Zhiguan, often translated as calming and contemplation, is one of the most central practice and doctrinal terms in the Tiantai tradition. Zhi refers to calming, stilling, and stabilizing the mind, while guan refers to contemplation, observation, and insight into the nature of reality. In Tiantai Buddhism, zhiguan is not merely a meditation technique but a complete doctrinal-contemplative system closely connected with the three truths, one thought containing three thousand, the perfect teaching, and core texts such as Mohe Zhiguan. The Tiantai system of zhiguan associated with Master Zhiyi deeply influenced Chinese Tiantai, Japanese Tendai, and Korean Cheontae traditions."

