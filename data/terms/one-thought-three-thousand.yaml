summary_zh: "一念三千是天台宗最具代表性的核心教义之一，通常用来说明一念心中具足三千法界。其基本结构常与十界、十界互具、十如是和三世间相关，用以表达凡圣、迷悟、染净、依正诸法在一念中圆融具足。此教义与《法华经》、三谛圆融、止观实践和圆教思想密切相关，是理解天台宗圆融世界观和修行观的重要入口。本资料库将一念三千记录为天台宗模块的核心术语，并与智者大师、《摩诃止观》《法华玄义》以及日本天台、韩国天台的传播关系建立关联。"

summary_en: "One thought contains three thousand is one of the most distinctive core doctrines of Tiantai Buddhism. It explains that a single thought-moment contains the full range of three thousand realms. Its structure is commonly associated with the ten realms, the mutual inclusion of the ten realms, the ten suchnesses, and the three realms of existence. The doctrine expresses the interpenetration of ordinary and sacred, delusion and awakening, impurity and purity, and the full range of dependent reality within one thought. It is closely connected with the Lotus Sutra, the interpenetrating three truths, zhiguan practice, and the perfect teaching. This archive records it as a core Tiantai term connected with Master Zhiyi, Mohe Zhiguan, Fahua Xuanyi, and the transmission of Tiantai thought to Japanese Tendai and Korean Cheontae."

