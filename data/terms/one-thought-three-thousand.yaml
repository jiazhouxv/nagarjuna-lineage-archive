term_usage_note_zh: "一念三千是天台宗极具代表性的圆融教义，用以说明一念心中具足十界、十如是、三世间等一切法界。本资料库以 one-thought-three-thousand 作为稳定 ID。"
term_usage_note_en: "One thought contains three thousand is one of the most distinctive doctrines of Tiantai Buddhism. It explains that a single thought-moment contains the ten realms, the ten suchnesses, the three realms of existence, and the full range of dharmas. This archive uses one-thought-three-thousand as the stable ID."

