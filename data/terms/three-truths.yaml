term_usage_note_zh: "三谛通常指空谛、假谛、中谛，是天台宗解释诸法实相和圆融思想的重要教义。本资料库以 three-truths 作为稳定 ID。"
term_usage_note_en: "The three truths usually refer to the truth of emptiness, the truth of provisional existence, and the truth of the middle. They are central to Tiantai interpretation of the true aspect of all dharmas and the doctrine of interpenetration. This archive uses three-truths as the stable ID."

