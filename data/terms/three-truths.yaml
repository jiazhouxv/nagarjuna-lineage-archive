components:
  - id: emptiness
    term_zh: 空谛
    term_en: truth of emptiness
    note_zh: "说明诸法无自性、缘起性空。"
    note_en: "Indicates that phenomena lack independent self-nature and are empty through dependent arising."

  - id: provisional-existence
    term_zh: 假谛
    term_en: truth of provisional existence
    note_zh: "说明诸法虽空而依缘假立、作用宛然。"
    note_en: "Indicates that phenomena, while empty, function provisionally through dependent conditions."

  - id: middle
    term_zh: 中谛
    term_en: truth of the middle
    note_zh: "说明空与假不二，离两边而圆融。"
    note_en: "Indicates the middle that transcends and integrates emptiness and provisional existence."

summary_zh: "三谛是天台宗极为重要的核心教义，通常指空谛、假谛、中谛。天台宗通过三谛说明诸法既空、又假、又中：空谛显示诸法无自性，假谛显示诸法依缘假有，中谛显示空与假圆融不二。三谛思想与中观思想有深厚关系，也在天台宗中被进一步发展为圆融三谛，成为理解《法华经》、止观实践、一念三千和圆教思想的重要基础。"

summary_en: "The three truths are among the most important doctrines in Tiantai Buddhism. They usually refer to the truth of emptiness, the truth of provisional existence, and the truth of the middle. Tiantai uses the three truths to explain that all phenomena are empty, provisionally existent, and middle at once: emptiness indicates the lack of independent self-nature, provisional existence indicates dependent functioning, and the middle indicates the nonduality and integration of emptiness and provisionality. The doctrine has deep connections with Madhyamaka thought and was further developed in Tiantai as the interpenetrating three truths, forming a foundation for interpreting the Lotus Sutra, zhiguan practice, one thought containing three thousand, and the perfect teaching."

