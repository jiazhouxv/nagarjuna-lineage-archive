name_usage_note_zh: "天台宗是汉传佛教重要宗派之一；日本分支通常称 Tendai，韩国分支通常称 Cheontae。本资料库以 Tiantai 作为总宗派 ID。"
name_usage_note_en: "Tiantai is an important East Asian Buddhist tradition. Its Japanese branch is commonly called Tendai, and its Korean branch is commonly called Cheontae. This archive uses Tiantai as the parent tradition ID."

