  region_en: China
  period_zh: 南北朝至隋唐时期形成并系统化
  period_en: Developed and systematized from the Northern and Southern Dynasties through the Sui and Tang periods
  note_zh: "天台宗以中国天台山及智者大师的教观体系为核心，但其思想源流常上溯至龙树、中观、般若与《法华经》传统。"
  note_en: "Tiantai is centered on the Chinese Tiantai tradition and Master Zhiyi's doctrinal-contemplative system, while its intellectual sources are often traced to Nagarjuna, Madhyamaka, Prajnaparamita, and the Lotus Sutra tradition."

