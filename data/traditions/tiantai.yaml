doctrinal_focus:
  - term: lotus-sutra
    note_zh: "《法华经》是天台宗教义体系的重要经典基础。"
    note_en: "The Lotus Sutra is a major scriptural foundation of Tiantai thought."

  - term: zhiguan
    note_zh: "止观是天台宗修行与教观体系的核心概念。"
    note_en: "Calming and contemplation is a central concept in Tiantai practice and doctrine."

  - term: three-truths
    note_zh: "三谛思想是天台宗解释空、假、中关系的重要教义。"
    note_en: "The three truths are central to Tiantai interpretation of emptiness, provisional existence, and the middle."

  - term: one-thought-three-thousand
    note_zh: "一念三千是天台宗极具代表性的圆融思想。"
    note_en: "One thought containing three thousand is one of the most distinctive Tiantai doctrines."

summary_zh: "天台宗是东亚佛教史上极为重要的宗派之一，以《法华经》为重要经典基础，以智者大师所系统化的教观体系为核心。天台宗的思想源流常上溯至龙树菩萨、中观思想、般若思想和鸠摩罗什译经传统；在中国，经慧文、慧思、智者大师、章安大师、荆溪湛然等人物逐步形成、整理和复兴。天台宗后来传播至日本，形成日本天台宗 Tendai；也传播和转化于朝鲜半岛，形成韩国天台宗 Cheontae。本资料库将天台宗作为第一个重点模块，用以整理龙树菩萨相关思想在东亚佛教中的接受、转化、宗派建构和地域传播。"

summary_en: "Tiantai is one of the most important traditions in East Asian Buddhist history. It takes the Lotus Sutra as a major scriptural foundation and is centered on the doctrinal-contemplative system systematized by Master Zhiyi. Its intellectual sources are often traced to Nagarjuna, Madhyamaka thought, Prajnaparamita traditions, and Kumarajiva's translation activity. In China, Tiantai developed through figures such as Huiwen, Huisi, Master Zhiyi, Master Guanding, and Jingxi Zhanran. It later spread to Japan as Tendai and to Korea as Cheontae. This archive treats Tiantai as the first active module for documenting Nagarjuna-related reception, transformation, lineage construction, and regional transmission in East Asian Buddhism."

