name_usage_note_zh: "三论宗是以《中论》《十二门论》《百论》为核心论书的东亚中观传统。本资料库以 sanlun 作为稳定 ID。"
name_usage_note_en: "Sanlun refers to the East Asian Madhyamaka tradition centered on three core treatises: Zhonglun, Shiermenlun, and Bailun. This archive uses sanlun as the stable ID."

