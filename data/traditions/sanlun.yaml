summary_zh: "三论宗是东亚佛教中以中观思想为核心的重要宗派之一，名称来自《中论》《十二门论》《百论》三部核心论书。它与龙树菩萨、提婆、鸠摩罗什译经传统以及吉藏的系统阐释密切相关。本资料库将三论宗作为天台宗之后的下一个模块，用于整理龙树相关思想在汉传佛教中的另一条重要接受与宗派化路径。"

summary_en: "Sanlun is an important East Asian Buddhist tradition centered on Madhyamaka thought. Its name comes from three core treatises: Zhonglun, Shiermenlun, and Bailun. It is closely connected with Nagarjuna, Aryadeva, Kumarajiva's translation tradition, and Jizang's systematic interpretations. This archive treats Sanlun as the next module after Tiantai for documenting another major Chinese Buddhist reception and institutionalization of Nagarjuna-related thought."

