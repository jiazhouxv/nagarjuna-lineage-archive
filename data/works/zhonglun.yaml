summary_zh: "《中论》是三论宗最核心的论书之一，通常归于龙树菩萨造、鸠摩罗什译。它是汉传佛教中观思想与三论宗教义建构的重要基础。本资料库将《中论》记录为三论宗模块的核心典籍，并与龙树、鸠摩罗什、吉藏、空、中观、二谛等人物和术语建立关联。"

summary_en: "Zhonglun is one of the core treatises of the Sanlun tradition, commonly attributed to Nagarjuna and translated into Chinese by Kumarajiva. It is a major foundation for Madhyamaka thought and Sanlun doctrinal formation in Chinese Buddhism. This archive records Zhonglun as a core work in the Sanlun module and links it with Nagarjuna, Kumarajiva, Jizang, emptiness, Madhyamaka, and the two truths."

