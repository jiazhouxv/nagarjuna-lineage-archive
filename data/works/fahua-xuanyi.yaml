summary_zh: "《法华玄义》是天台宗核心典籍之一，通常被列为天台三大部之一。此书围绕《妙法莲华经》的深层义理展开，系统阐释天台宗对《法华经》的理解，并与判教、圆教、三谛、诸法实相等天台教义密切相关。《法华玄义》不仅是一部经义阐释著作，也是天台宗建立自身教义体系和判教框架的重要文本。本资料库将其记录为天台宗模块的核心典籍，并与智者大师、章安大师、荆溪湛然、《法华经》、判教体系和圆教思想建立关联。"

summary_en: "Fahua Xuanyi, often translated as Profound Meaning of the Lotus Sutra, is one of the core works of the Tiantai tradition and is commonly grouped among the Three Great Tiantai Works. The text presents a systematic interpretation of the deeper meaning of the Lotus Sutra and is closely connected with Tiantai doctrines such as doctrinal classification, the perfect teaching, the three truths, and the true aspect of all dharmas. Fahua Xuanyi is not only a commentary on the Lotus Sutra but also a foundational text for Tiantai doctrinal identity and interpretive structure. This archive records it as a core Tiantai work connected with Master Zhiyi, Master Guanding, Jingxi Zhanran, the Lotus Sutra, doctrinal classification, and perfect teaching thought."

