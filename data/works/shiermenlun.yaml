summary_zh: "《十二门论》是三论宗三部核心论书之一，通常归于龙树菩萨造、鸠摩罗什译。它与《中论》《百论》共同构成三论宗名称和教义体系的重要文献基础。本资料库将《十二门论》记录为三论宗模块的核心典籍，并与龙树、鸠摩罗什、吉藏、空、中观、二谛等人物和术语建立关联。"

summary_en: "Shiermenlun is one of the three core treatises of the Sanlun tradition, commonly attributed to Nagarjuna and translated into Chinese by Kumarajiva. Together with Zhonglun and Bailun, it forms an important textual foundation for the Sanlun name and doctrinal system. This archive records Shiermenlun as a core work in the Sanlun module and links it with Nagarjuna, Kumarajiva, Jizang, emptiness, Madhyamaka, and the two truths."

