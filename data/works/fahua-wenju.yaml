summary_zh: "《法华文句》是天台宗核心典籍之一，通常被列为天台三大部之一。此书主要围绕《妙法莲华经》的经文进行解释，重在逐句、逐段阐发《法华经》的文义、结构和教义内涵。与偏重义理纲领的《法华玄义》和偏重修行观法的《摩诃止观》相比，《法华文句》更集中体现天台宗对《法华经》文本本身的注释传统。它对于理解天台宗的法华解释学、判教体系、圆教思想和经文诠释方法具有重要意义。本资料库将其记录为天台宗模块的核心典籍，并与智者大师、章安大师、荆溪湛然、《法华经》以及天台宗经义解释传统建立关联。"

summary_en: "Fahua Wenju, often translated as Words and Phrases of the Lotus Sutra, is one of the core works of the Tiantai tradition and is commonly grouped among the Three Great Tiantai Works. The text focuses on explaining the wording, passages, structure, and doctrinal meaning of the Lotus Sutra. Compared with Fahua Xuanyi, which emphasizes doctrinal meaning, and Mohe Zhiguan, which emphasizes contemplative practice, Fahua Wenju more directly represents the Tiantai exegetical tradition centered on the Lotus Sutra text itself. It is important for understanding Tiantai Lotus hermeneutics, doctrinal classification, perfect teaching thought, and scriptural interpretation. This archive records it as a core Tiantai work connected with Master Zhiyi, Master Guanding, Jingxi Zhanran, the Lotus Sutra, and Tiantai exegetical traditions."

