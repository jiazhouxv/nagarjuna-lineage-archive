summary_zh: "《百论》是三论宗三部核心论书之一，通常归于提婆造、鸠摩罗什译。它与《中论》《十二门论》共同构成三论宗的重要文本基础。本资料库将《百论》记录为三论宗模块的核心典籍，并与龙树、鸠摩罗什、吉藏、空、中观、二谛等人物和术语建立关联。"

summary_en: "Bailun is one of the three core treatises of the Sanlun tradition, commonly attributed to Aryadeva and translated into Chinese by Kumarajiva. Together with Zhonglun and Shiermenlun, it forms an important textual basis for Sanlun. This archive records Bailun as a core work in the Sanlun module and links it with Nagarjuna, Kumarajiva, Jizang, emptiness, Madhyamaka, and the two truths."

