summary_zh: "《摩诃止观》是天台宗最重要的核心典籍之一，通常被视为智者大师教观体系的代表性著作，由章安大师灌顶根据智者大师讲授内容记录、整理而成。此书以止观修行为核心，结合天台宗的圆教思想、三谛、一念三千、观法次第和修行实践，构成天台宗教观体系的重要基础。《摩诃止观》不仅是修行论著，也是天台宗理解佛法、实践观法和建立宗派身份的关键文本。本资料库将其记录为天台宗模块的核心典籍，并与智者大师、章安大师、荆溪湛然、止观、一念三千等人物和术语建立关联。"

summary_en: "Mohe Zhiguan, often translated as Great Calming and Contemplation, is one of the most important core texts of the Tiantai tradition. It is commonly understood as based on Master Zhiyi's lectures and compiled or recorded by Master Guanding. Centered on calming and contemplation practice, the work integrates Tiantai doctrines such as the perfect teaching, the three truths, one thought containing three thousand, contemplative methods, and practical cultivation. Mohe Zhiguan is not only a meditation treatise but also a foundational text for Tiantai doctrinal identity and practice. This archive records it as a core Tiantai work connected with Master Zhiyi, Master Guanding, Jingxi Zhanran, zhiguan, and one thought containing three thousand."

