description_zh: "本时间线记录天台宗从思想源流、早期中国发展，到日本天台宗和韩国天台宗地域传播的总览。"
description_en: "This timeline records an overview of Tiantai from its intellectual sources and early Chinese development to regional transmission in Japan and Korea."

