    title_en: "Nagarjuna and Madhyamaka thought become important intellectual sources later traced by Tiantai tradition"
    description_zh: "天台宗传统常将自身思想源流上溯至龙树菩萨、中观思想、空义和二谛思想。本项目将其记录为思想源流关系，而不是直接历史建宗关系。"
