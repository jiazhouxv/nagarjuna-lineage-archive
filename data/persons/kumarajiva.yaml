    source_refs: []

summary_zh: "鸠摩罗什是汉传佛教史上极为重要的译经家。他的译经活动对中观思想、般若思想、《法华经》接受史、三论宗形成以及后来的天台宗思想体系都有深远影响。本资料库将鸠摩罗什记录为连接印度佛教、中亚佛教与汉传佛教的重要传播人物。"

summary_en: "Kumarajiva was one of the most important translators in the history of Chinese Buddhism. His translation activity deeply influenced the reception of Madhyamaka, Prajnaparamita literature, the Lotus Sutra, the formation of the Sanlun tradition, and later Tiantai doctrinal development. This archive records him as a key transmission figure connecting Indian, Central Asian, and Chinese Buddhism."

