summary_zh: "智者大师，正式名智顗，是天台宗历史上最重要的人物之一。他在天台宗传统中被视为教观体系的核心奠基者和集大成者，与《摩诃止观》《法华玄义》《法华文句》等天台核心典籍密切相关。智者大师的思想体系以《法华经》为重要依据，发展出止观、三谛、一念三千、判教等天台宗核心教义。本资料库将智者大师记录为天台宗模块的核心人物，并把其相关著作、术语、师承和思想影响分别纳入 works、terms 与 relations 数据。"

summary_en: "Master Zhiyi, formally named Zhiyi, is one of the most important figures in the history of the Tiantai tradition. In Tiantai tradition, he is regarded as the central systematizer of the doctrinal and contemplative system. He is closely associated with core Tiantai works such as Mohe Zhiguan, Fahua Xuanyi, and Fahua Wenju. His thought is deeply connected with the Lotus Sutra and includes key Tiantai doctrines such as calming and contemplation, the three truths, one thought containing three thousand, and doctrinal classification. This archive records Master Zhiyi as a central figure in the Tiantai module and connects his works, terms, lineage, and influence through separate work, term, and relation records."

