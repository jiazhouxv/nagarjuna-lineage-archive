summary_zh: "荆溪湛然，正式法号湛然，俗姓戚，常州晋陵荆溪人，即今江苏宜兴一带，尊称妙乐大师，是唐代天台宗极为重要的人物。天台宗传统常将其列为天台宗九祖，并视为中兴天台宗的重要祖师。湛然通过对智者大师《摩诃止观》《法华玄义》《法华文句》等核心著作的注释、阐发和辩护，进一步确立了天台宗的教义边界和宗派身份。他也与无情有性、判教体系和天台宗自我认同的强化密切相关。本资料库将湛然记录为智者大师、章安大师之后，天台宗在唐代复兴与体系化的重要节点。"

summary_en: "Jingxi Zhanran, formally named Zhanran and also honored as Master Miaole, was a major figure in Tang dynasty Tiantai Buddhism. He is commonly identified as a native of Jingxi, corresponding to modern-day Yixing, Jiangsu. Tiantai tradition often presents him as the ninth patriarch and as an important reviver of the Tiantai school. Through commentaries on Master Zhiyi's core works such as Mohe Zhiguan, Fahua Xuanyi, and Fahua Wenju, Zhanran helped define, defend, and transmit Tiantai doctrinal thought. He is also associated with the doctrine of the buddha-nature of insentient beings, doctrinal classification, and the strengthening of Tiantai identity. This archive records Zhanran as a key figure in the Tang revival and systematization of Tiantai after Master Zhiyi and Master Guanding."

