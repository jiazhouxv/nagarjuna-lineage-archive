summary_zh: "慧思是天台宗早期谱系中的重要人物，通常被称为南岳慧思。他在天台宗传统中被视为智顗的重要老师，并在法华信仰、禅观实践和早期天台思想形成中具有关键地位。本资料库将慧思记录为连接慧文、智顗与天台教观体系的重要传承节点。"

summary_en: "Huisi, often known as Nanyue Huisi, is an important figure in early Tiantai lineage narratives. Tiantai tradition regards him as a major teacher of Zhiyi and a key figure in the development of Lotus Sutra devotion, meditative practice, and early Tiantai thought. This archive records Huisi as an important transmission node linking Huiwen, Zhiyi, and the formation of Tiantai doctrinal and contemplative systems."

