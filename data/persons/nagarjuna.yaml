summary_zh: "龙树菩萨是大乘佛教史上极具影响力的思想家，通常与中观学派、空性思想和二谛思想密切相关。在东亚佛教传统中，龙树菩萨也常被后世宗派纳入祖师谱系或思想源流叙述。本资料库以龙树菩萨为思想源点，整理其相关思想在东亚佛教诸宗中的接受、转化和传承。"

summary_en: "Nagarjuna was one of the most influential thinkers in Mahayana Buddhist history and is closely associated with Madhyamaka, emptiness, and the two truths. In East Asian Buddhist traditions, Nagarjuna is often included in later lineage narratives or doctrinal genealogies. This archive uses Nagarjuna as a starting point for documenting the reception, transformation, and transmission of related thought across East Asian Buddhist traditions."

