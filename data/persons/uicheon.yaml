summary_zh: "大觉国师义天，法名义天，俗名王煦，是高丽王室出身的重要僧人、佛教学者和韩国天台宗关键人物。他通常被视为高丽时期推动韩国天台宗独立成宗的重要人物。义天重视教观体系，也试图调和教宗与禅宗之间的张力，并在佛教文献目录和典籍整理方面具有重要贡献。本资料库将义天记录为中国天台宗向韩国天台宗传播、转化和制度化过程中的核心人物。"

summary_en: "Daegak Guksa Uicheon, born Wang Hu, was a Goryeo royal prince, Buddhist monk, scholar, and key figure in Korean Cheontae Buddhism. He is commonly regarded as a major figure in establishing Cheontae as an independent school during the Goryeo period. Uicheon emphasized doctrinal and contemplative learning and sought to reconcile tensions between doctrinal Buddhist schools and Seon meditation traditions. He also made important contributions to Buddhist bibliography and textual organization. This archive records Uicheon as a central figure in the transmission, transformation, and institutionalization of Tiantai/Cheontae in Korea."

