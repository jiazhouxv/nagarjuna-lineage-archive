summary_zh: "慧文是天台宗早期谱系中重要但资料相对有限的人物。天台宗传统常将其置于慧思、智顗之前，用以说明中观、三谛和止观思想在天台宗形成之前的思想承接。本资料库将慧文记录为天台宗早期谱系和思想传承中的关键节点，但其具体生平、年代和文献依据仍需进一步校核。"

summary_en: "Huiwen is an important but historically less documented figure in early Tiantai lineage narratives. Tiantai tradition often places him before Huisi and Zhiyi as a figure associated with the reception of Madhyamaka-related thought, the three truths, and meditative practice. This archive records Huiwen as a key node in early Tiantai lineage and doctrinal transmission, while marking his dates and sources as requiring further verification."

