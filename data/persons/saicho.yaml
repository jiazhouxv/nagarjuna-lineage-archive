summary_zh: "传教大师最澄是日本天台宗的关键人物，通常被视为日本天台宗的开创者。最澄赴唐求法，学习天台教法、密教、禅法和戒律等内容，回到日本后以比叡山为中心建立日本天台宗的基础。他在日本佛教史上具有极高地位，不仅承接中国天台宗传统，也推动日本佛教制度、戒律和宗派格局的变化。本资料库将最澄记录为中国天台宗向日本天台宗传播的核心人物。"

summary_en: "Saicho, later honored as Dengyo Daishi, was a central figure in Japanese Buddhist history and is commonly regarded as the founder of the Japanese Tendai school. He traveled to Tang China, studied Tiantai teachings along with esoteric Buddhism, meditation, and precept traditions, and later established the foundations of Japanese Tendai centered on Mount Hiei. This archive records Saicho as a key figure in the transmission from Chinese Tiantai to Japanese Tendai."

