summary_zh: "吉藏，又称嘉祥大师，是中国三论宗传统中的核心人物之一。他以阐释中观、二谛、空义以及三论核心论书而闻名，常被视为中国三论宗的重要集大成者。本资料库将吉藏记录为三论宗模块的核心人物，并与《中论》《十二门论》《百论》以及中观、空、二谛等术语建立关联。"

summary_en: "Jizang, also known by the honorific Jiaxiang Dashi, is one of the central figures in the Chinese Sanlun tradition. He is known for interpreting Madhyamaka, the two truths, emptiness, and the three core Sanlun treatises, and is commonly regarded as a major systematizer of Chinese Sanlun thought. This archive records Jizang as a core person in the Sanlun module and links him with Zhonglun, Shiermenlun, Bailun, Madhyamaka, emptiness, and the two truths."

