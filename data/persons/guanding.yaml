summary_zh: "章安大师，正式名灌顶，是天台宗早期传承中极为重要的人物。他是智者大师的重要弟子，负责记录、整理和编辑智者大师的讲授内容，对《摩诃止观》《法华玄义》《法华文句》等天台核心文献的形成和流传具有关键作用。灌顶不仅保存了智者大师的教观体系，也参与建构了早期天台宗的谱系叙述和文献传统。本资料库将灌顶记录为智者大师之后的重要传承、编辑和文献整理人物。"

summary_en: "Master Guanding, formally named Guanding and often known as Zhang'an Guanding, was a crucial figure in early Tiantai transmission. He was an important disciple of Master Zhiyi and played a central role in recording, organizing, and editing Zhiyi's lectures. His work was essential for the formation and transmission of core Tiantai texts such as Mohe Zhiguan, Fahua Xuanyi, and Fahua Wenju. This archive records Guanding as a major transmitter, editor, and organizer of early Tiantai teachings."

