      - name: "Tendai Buddhist Institute - Japanese Foundations"
        url: "https://www.tendai.org/tendai/japan/"
        identifier: "Japanese Foundations of Tendai"
        license_note: "External reference source. Full text not redistributed."
        reliability_note: "Tradition-oriented educational source."

  - id: tiantai-has-korean-branch
    type: relation
    subject: tiantai
    object: cheontae-korea
    relation_type: parent_tradition_to_branch
    confidence: high
    note_zh: "韩国天台宗 Cheontae 是天台宗在朝鲜半岛的地域分支，通常与高丽义天的活动密切相关。"
    note_en: "Korean Cheontae is the Korean regional branch of the Tiantai tradition, commonly associated with Uicheon's activity during the Goryeo period."
    source_refs:
      - name: "Encyclopedia of Buddhism - Cheontae"
        url: "https://encyclopediaofbuddhism.org/wiki/Cheontae"
        identifier: "Cheontae"
        license_note: "External reference source. Full text not redistributed."
        reliability_note: "Buddhist encyclopedia reference; details should be checked against primary or academic sources."

  - id: chinese-tiantai-transmits-to-japanese-tendai
    type: relation
    subject: tiantai-china
    object: tendai-japan
    relation_type: regional_transmission
    key_persons:
      - saicho
      - daosui
      - xingman
    confidence: high
    note_zh: "日本天台宗传统中，最澄赴唐求法，将中国天台教法及相关佛教传统传入日本。"
    note_en: "In Japanese Tendai tradition, Saicho traveled to Tang China and transmitted Chinese Tiantai teachings and related Buddhist traditions to Japan."
    source_refs:
      - name: "Encyclopaedia Britannica - Saicho"
        url: "https://www.britannica.com/biography/Saicho"
        identifier: "Saicho"
        license_note: "External reference source. Full text not redistributed."
        reliability_note: "General encyclopedia reference."

  - id: chinese-tiantai-transmits-to-korean-cheontae
    type: relation
    subject: tiantai-china
    object: cheontae-korea
    relation_type: regional_transmission
    key_persons:
      - uicheon
    confidence: high
    note_zh: "韩国天台宗通常与义天入宋求法、推动高丽天台宗独立成宗有关。"
    note_en: "Korean Cheontae is commonly associated with Uicheon's study in Song China and his role in establishing Cheontae as an independent school in Goryeo."
