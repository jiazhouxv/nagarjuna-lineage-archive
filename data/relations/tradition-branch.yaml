id: tradition-branch
type: relation_file

title_zh: 宗派与地域分支关系
title_en: Tradition and Regional Branch Relations

description_zh: "本文件记录天台宗总宗派与中国天台宗、日本天台宗、韩国天台宗之间的分支关系。"
description_en: "This file records the branch relations between the parent Tiantai tradition and its Chinese, Japanese, and Korean regional branches."

relations:
  - id: tiantai-has-chinese-branch
    type: relation
    subject: tiantai
    object: tiantai-china
    relation_type: parent_tradition_to_branch
    confidence: high
    note_zh: "中国天台宗是天台宗的核心源流和中国地域分支。"
    note_en: "Chinese Tiantai is the core source branch and Chinese regional branch of the Tiantai tradition."
    source_refs:
      - name: "Encyclopedia.com - Tiantai School"
        url: "https://www.encyclopedia.com/religion/encyclopedias-almanacs-transcripts-and-maps/tiantai-school"
