        license_note: "External reference source. Full text not redistributed."
        reliability_note: "General encyclopedia reference."

  - id: tiantai-has-japanese-branch
    type: relation
    subject: tiantai
    object: tendai-japan
    relation_type: parent_tradition_to_branch
    confidence: high
    note_zh: "日本天台宗 Tendai 是天台宗在日本的地域分支，通常与最澄赴唐求法和比叡山传统密切相关。"
    note_en: "Japanese Tendai is the Japanese regional branch of the Tiantai tradition, commonly associated with Saicho's study in Tang China and the Mount Hiei tradition."
